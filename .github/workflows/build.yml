name: Update Build

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'receptron'
    strategy:
      matrix:
        node-version: [24.x]
    steps:
    - uses: actions/checkout@v5
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v5
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'yarn'
    - name: Cache node_modules
      uses: actions/cache@v5
      with:
        path: node_modules
        key: node-modules-${{ matrix.node-version }}-${{ hashFiles('yarn.lock') }}
    - run: yarn install --frozen-lockfile
    - run: yarn run template
    - name: Open PR if templates changed
      uses: peter-evans/create-pull-request@v7
      with:
        commit-message: "chore: regenerate templates"
        title: "chore: regenerate templates"
        body: |
          Auto-generated by the `Update Build` workflow after running `yarn run template` on `main`.
        branch: chore/regenerate-templates
        delete-branch: true
        base: main
